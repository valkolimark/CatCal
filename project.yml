name: CatCal
options:
  bundleIdPrefix: com.valkolimark
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: VJJB67S9K8
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.0.0"
  MSAL:
    url: https://github.com/AzureAD/microsoft-authentication-library-for-objc
    from: "2.9.0"

targets:
  CatCal:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
        excludes:
          # Referenced via CODE_SIGN_ENTITLEMENTS; must not ship as a bundled resource.
          - "App/CatCal.entitlements"
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: MSAL
        product: MSAL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valkolimark.catcal
        PRODUCT_NAME: CatCal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Sources/App/CatCal.entitlements
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: CatCal
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Lets CloudKit wake the app to pull remote SwiftData changes.
        UIBackgroundModes:
          - remote-notification
        NSCalendarsUsageDescription: "CatCal reads your calendars to build one unified view of your day across Google, Outlook, and iCloud."
        NSCalendarsFullAccessUsageDescription: "CatCal reads your calendars to build one unified view of your day across Google, Outlook, and iCloud."
        # OAuth client IDs. Neither is a secret — both are safe to commit.
        # Replace the placeholders with the real values from the Google Cloud
        # Console and Azure Portal (see README). `OAuthConfig` detects the
        # placeholders and shows the connect rows as "not configured" rather
        # than starting a sign-in that can only fail.
        GIDClientID: YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com
        MSALClientID: YOUR_MICROSOFT_CLIENT_ID
        CFBundleURLTypes:
          # Google: the reversed client ID, shown in the console right after
          # you create the iOS OAuth client.
          - CFBundleURLName: com.googleusercontent.apps.catcal
            CFBundleURLSchemes:
              - com.googleusercontent.apps.YOUR_GOOGLE_CLIENT_ID
          # Microsoft: the redirect URI Azure generates for an iOS platform
          # registration. Derived from the bundle ID, so it needs no editing.
          - CFBundleURLName: msauth.catcal
            CFBundleURLSchemes:
              - msauth.com.valkolimark.catcal
        # Lets MSAL hand off to the Microsoft Authenticator app when it's
        # installed, instead of always falling back to the web view.
        LSApplicationQueriesSchemes:
          - msauthv2
          - msauthv3

  CatCalTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/CatCalTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CatCal

schemes:
  CatCal:
    build:
      targets:
        CatCal: all
        CatCalTests: [test]
    test:
      targets:
        - CatCalTests
    run:
      config: Debug
