name: CatCal
options:
  bundleIdPrefix: com.valkolimark
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""

targets:
  CatCal:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valkolimark.catcal
        PRODUCT_NAME: CatCal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: CatCal
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCalendarsUsageDescription: "CatCal reads your calendars to build one unified view of your day across Google, Outlook, and iCloud."
        NSCalendarsFullAccessUsageDescription: "CatCal reads your calendars to build one unified view of your day across Google, Outlook, and iCloud."

  CatCalTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/CatCalTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CatCal

schemes:
  CatCal:
    build:
      targets:
        CatCal: all
        CatCalTests: [test]
    test:
      targets:
        - CatCalTests
    run:
      config: Debug
